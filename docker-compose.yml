services:
  api:
    image: ghcr.io/saleor/saleor:latest
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://saleor:${POSTGRES_PASSWORD}@db:5432/saleor
      # SECRET_KEY must be set to a strong random value before running in production.
      # Generate one with: python -c "import secrets; print(secrets.token_urlsafe(50))"
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      # ALLOWED_HOSTS should be set to your actual domain(s) in production, not '*'.
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:latest
    ports:
      - '9000:80'
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saleor
      POSTGRES_USER: saleor
      # Set POSTGRES_PASSWORD in your .env file — never use the default in production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
volumes:
  db_data:
